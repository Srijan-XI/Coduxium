name: "✨ Feature request"
description: "Suggest a new feature or improvement"
title: "[✨ Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 Share your idea
        This form is for new ideas or improvements.
        Non-technical descriptions are welcome.

  - type: textarea
    id: problem
    attributes:
      label: "🤔 What problem are you facing?"
      description: "Tell us what is difficult, confusing, or missing today."
      placeholder: "Example: It's hard to find beginner docs quickly."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "👥 Who needs this and when?"
      description: "Describe who benefits and in what situation."
      placeholder: "Example: New contributors during first setup."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "💡 Your proposed solution"
      placeholder: "Describe what you would like to see."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 Alternatives considered (optional)"
      placeholder: "Any other ideas you considered."

  - type: textarea
    id: impact
    attributes:
      label: "🌍 Scope and impact"
      description: "Which pages/features are affected?"
      placeholder: "Example: README, QuickStart, and search component."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🚦 Priority"
      options:
        - "🔴 High"
        - "🟡 Medium"
        - "🟢 Low"
    validations:
      required: true

  - type: textarea
    id: done-looks-like
    attributes:
      label: "✅ Done looks like..."
      description: "What should be true when this is complete?"
      placeholder: |
        - Users can ...
        - The page shows ...
        - Documentation includes ...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "📎 Extra details (optional)"
      description: "Add links, screenshots, examples, or mockups."

  - type: checkboxes
    id: final-checklist
    attributes:
      label: "✅ Final checklist"
      options:
        - label: "I searched existing issues and did not find a duplicate."
          required: true
        - label: "I explained the problem and desired outcome clearly."
          required: true
